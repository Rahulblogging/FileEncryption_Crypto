<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cryptography Vault</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="main-container">

        {% if message %}

            <div id="toast"
                class="{{ status }}">
                {{ message }}
            </div>

        {% endif %}

        <h1 class="title">
            CRYPTEX VAULT
        </h1>

        <p class="subtitle">
            Encrypt and decrypt files securely using password protection
        </p>

        <div class="cards-container">

            <!-- ENCRYPT CARD -->
            <div class="card">

                <h2>🔒 Encrypt File</h2>

                <form action="/encrypt"
                      method="POST"
                      enctype="multipart/form-data">

                    <input type="file"
                           name="file"
                           required>

                    <input type="password"
                           name="password"
                           placeholder="Enter Password"
                           required>

                    <button type="submit">
                        Encrypt File
                    </button>

                </form>

            </div>

            <!-- DECRYPT CARD -->
            <div class="card">

                <h2>🔓 Decrypt File</h2>

                <form action="/decrypt"
                      method="POST"
                      enctype="multipart/form-data">

                    <input type="file"
                           name="file"
                           required>

                    <input type="password"
                           name="password"
                           placeholder="Enter Password"
                           required>

                    <button type="submit">
                        Decrypt File
                    </button>

                </form>

            </div>

        </div>

    </div>

    <script>

    const toast = document.getElementById("toast");

    if(toast){

        setTimeout(() => {

            toast.style.display = "none";

        }, 3000);

    }

    if(window.location.search){

        window.history.replaceState(
            {},
            document.title,
            window.location.pathname
        );

    }

</script>

</body>

</html>
